<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="MªRocio_Almeida_Hernández.css">
  <title> Marcas Ficticias</title>
</head>
<body>
    <header>
        <h1>Buscador de Empresas Ficticias</h1>
    </header>

    <main>
        
        <section id="filtros" aria-labelledby="titulo-filtros"> 
            <h2 id="titulo-filtros">Filtrar por Categoría</h2>
            <div id="contenedorRadios" role="radiogroup" aria-required="true">
                
            </div>
        </section>

        
        <section id="seleccion" aria-labelledby="titulo-seleccion">
            <h2 id="titulo-seleccion">Selecciona una Empresa</h2>
            <label for="empresas-select">Empresas disponibles:</label>
            <select id="empresas-select" aria-controls="detalle-empresa"> 
                <option value="">Seleccione primero una categoría</option>
            </select>
        </section>

        
        <section id="detalle-empresa" aria-live="polite">
            <h2>Información de la Marca</h2>
            <div id="info-content">
                <p>Selecciona una empresa para ver sus detalles.</p>
            </div>
        </section>
    </main>

   
    <script src="MªRocio_Almeida_Hernández.js"></script>
    </main>
</body>
<footer>

</footer>
</html>
